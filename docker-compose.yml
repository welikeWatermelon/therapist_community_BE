services:
  db:
    image: pgvector/pgvector:pg16
    container_name: builders-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-builders}
      POSTGRES_USER: ${POSTGRES_USER:-builders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-builders}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - builders-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-builders} -d ${POSTGRES_DB:-builders}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: builders-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - builders-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: builders-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-builders}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-builders}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-builders}
      SPRING_JPA_OPEN_IN_VIEW: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-min-32-chars!}
      JWT_ACCESS_TTL_SEC: ${JWT_ACCESS_TTL_SEC:-1800}
      JWT_REFRESH_TTL_SEC: ${JWT_REFRESH_TTL_SEC:-1209600}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      APP_CORS_MOBILE_ORIGINS: ${APP_CORS_MOBILE_ORIGINS:-capacitor://localhost,http://localhost}
      APP_AWS_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SERVER_PORT: "8080"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - builders-uploads:/app/uploads
    restart: unless-stopped

volumes:
  builders-postgres-data:
  builders-redis-data:
  builders-uploads:
