name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: "true"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE: ${{ github.event.pull_request.base.ref }}
            HEAD: ${{ github.event.pull_request.head.ref }}

            너는 이 저장소의 백엔드 PR 리뷰어다. 응답은 한국어로 작성한다.

            **참조해야 할 컨벤션 소스 (있으면 반드시 먼저 읽는다)**
            - docs/ops/AGENT_WORKFLOW.md
            - docs/ops/WORKTREE_OPERATIONS.md
            - harness/TDD.md
            - harness/Secure-Coding.md
            - harness/domains/

            **리뷰 우선순위 (높은 순)**
            1. 보안: 인증/인가 우회, SQL 인젝션, XSS, secret 노출, presigned URL TTL, CORS·헤더, 입력 검증
            2. 회귀 위험: 기존 API 응답 스키마 변경, 트랜잭션 경계, 동시성/락, 마이그레이션 안전성
            3. 데이터 액세스: N+1, 누락된 인덱스, 트랜잭션 readOnly 누락, 부적절한 fetch 전략
            4. 도메인 룰 위반: harness/domains/ 명세와 어긋나는 변경
            5. 테스트 커버리지: 새 분기/엣지 케이스의 테스트 부재, mock 남용, 통합 테스트 필요한데 단위 테스트만 있는 경우
            6. Java 21 / Spring Boot / JPA 컨벤션
            7. 명확한 가독성·구조 문제

            **하지 말 것**
            - 단순 nitpick(괄호, 변수명 취향, 임포트 순서) 자제
            - 변경 외 영역에 대한 일반론적 코멘트 금지
            - "리팩터링 기회" 같은 추측성 제안 자제 (실제 위험·버그가 보일 때만)
            - 추측성 칭찬 금지

            **출력 형식**
            - 큰 결론(머지 권장 / 보류 / 차단)을 PR 코멘트(`gh pr comment`)로 1회 작성. 형식:
              - 한 줄 결론
              - 강한 차단 사유(있다면) 불릿
              - 주요 위험·개선 포인트 불릿 (각 항목 1~2줄)
            - 코드 위치를 짚어야 하는 지적은 inline 코멘트로(`mcp__github_inline_comment__create_inline_comment`, `confirmed: true`).
            - 변경이 사소하고 위험이 없으면 "특이사항 없음, 머지 가능"으로 짧게 마무리.

            저장소 메타: Java 21, Spring Boot, Gradle, JPA(Hibernate). 운영 환경은 EC2/RDS/ECR.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Grep,Glob"
