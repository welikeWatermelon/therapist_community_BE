name: "CI/CD — main to dev"

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
      - deploy
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "771338875653"
  ECR_REPOSITORY: therapist-community-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 로컬 테스트 후 푸시 권장, CI 속도 우선. 추후 별도 test job 추가 예정
      - name: Build JAR
        run: ./gradlew clean bootJar -x test

      - name: Debug OIDC token sub
        run: |
          IDTOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo $IDTOKEN | cut -d '.' -f2 | base64 -d 2>/dev/null | jq '.sub'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::771338875653:role/GitHubActionsMelonneCommunityDeployRole
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 staging (SSM)
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0900290d4507a329a \
            --document-name "AWS-RunShellScript" \
            --region ap-northeast-2 \
            --parameters 'commands=[
              "set -eux",
              "IMAGE=771338875653.dkr.ecr.ap-northeast-2.amazonaws.com/therapist-community-backend:latest",
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 771338875653.dkr.ecr.ap-northeast-2.amazonaws.com",
              "docker pull $IMAGE",
              "docker rm -f builders-backend-new || true",
              "aws secretsmanager get-secret-value --secret-id community/melonne/db/staging --region ap-northeast-2 --query SecretString --output text > /tmp/staging.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/redis/staging --region ap-northeast-2 --query SecretString --output text >> /tmp/staging.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/jwt/staging --region ap-northeast-2 --query SecretString --output text >> /tmp/staging.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/sentry/staging --region ap-northeast-2 --query SecretString --output text >> /tmp/staging.env",
              "echo SPRING_PROFILES_ACTIVE=dev >> /tmp/staging.env",
              "echo APP_AWS_ENABLED=true >> /tmp/staging.env",
              "echo SPRING_AI_OPENAI_API_KEY=dummy-key-not-used >> /tmp/staging.env",
              "echo APP_BASE_URL=http://43.201.120.96:8080 >> /tmp/staging.env",
              "S3_BUCKET=$(aws ssm get-parameter --name /community/melonne/config/staging/s3-bucket-name --region ap-northeast-2 --query Parameter.Value --output text)",
              "S3_REGION=$(aws ssm get-parameter --name /community/melonne/config/staging/s3-region --region ap-northeast-2 --query Parameter.Value --output text)",
              "CORS=$(aws ssm get-parameter --name /community/melonne/config/staging/cors-origins --region ap-northeast-2 --query Parameter.Value --output text)",
              "MOBILE=$(aws ssm get-parameter --name /community/melonne/config/staging/cors-mobile-origins --region ap-northeast-2 --query Parameter.Value --output text 2>/dev/null || true)",
              "echo APP_AWS_REGION=$S3_REGION >> /tmp/staging.env",
              "echo APP_AWS_S3_BUCKET=$S3_BUCKET >> /tmp/staging.env",
              "echo APP_CORS_ALLOWED_ORIGINS=$CORS >> /tmp/staging.env",
              "[ x$MOBILE != x ] && echo APP_CORS_MOBILE_ORIGINS=$MOBILE >> /tmp/staging.env || echo cors-mobile-origins absent, using yaml default",
              "aws secretsmanager get-secret-value --secret-id community/melonne/google-ai/staging --region ap-northeast-2 --query SecretString --output text >> /tmp/staging.env 2>/dev/null || echo google-ai secret absent, ai-comment key not injected",
              "echo KNOWLEDGE_ENABLED=true >> /tmp/staging.env",
              "docker run -d --name builders-backend-new --env-file /tmp/staging.env -p 8081:8080 $IMAGE",
              "for i in $(seq 1 12); do curl -sf http://localhost:8081/actuator/health && echo Health check passed && break || { [ $i -eq 12 ] && echo Health check failed && docker rm -f builders-backend-new && rm -f /tmp/staging.env && exit 1; }; sleep 5; done",
              "docker stop builders-backend || true",
              "docker rm builders-backend || true",
              "docker stop builders-backend-new && docker rm builders-backend-new",
              "docker run -d --name builders-backend --env-file /tmp/staging.env -p 8080:8080 --restart unless-stopped $IMAGE",
              "rm -f /tmp/staging.env",
              "docker image prune -f",
              "docker container prune -f",
              "echo Zero-downtime deploy complete"
            ]' \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id i-0900290d4507a329a \
              --region ap-northeast-2 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "Deploy succeeded!"; break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed!"
              sleep 5
              echo "::group::SSM invocation"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0900290d4507a329a --region ap-northeast-2 --output json || true
              echo "::endgroup::"
              echo "::group::SSM standard output"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0900290d4507a329a --region ap-northeast-2 --query 'StandardOutputContent' --output text || true
              echo "::endgroup::"
              echo "::group::SSM standard error"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0900290d4507a329a --region ap-northeast-2 --query 'StandardErrorContent' --output text || true
              echo "::endgroup::"
              exit 1
            fi
            [ "$i" -eq 30 ] && echo "Timeout" && exit 1
            sleep 10
          done
  deploy-prod:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::771338875653:role/GitHubActionsMelonneCommunityDeployRole
          aws-region: ap-northeast-2

      - name: Deploy to EC2 prod (SSM)
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0086047e1fd4f4743 \
            --document-name "AWS-RunShellScript" \
            --region ap-northeast-2 \
            --parameters 'commands=[
              "set -eux",
              "IMAGE=771338875653.dkr.ecr.ap-northeast-2.amazonaws.com/therapist-community-backend:latest",
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 771338875653.dkr.ecr.ap-northeast-2.amazonaws.com",
              "docker pull $IMAGE",
              "docker rm -f builders-backend-new || true",
              "aws secretsmanager get-secret-value --secret-id community/melonne/db/prod --region ap-northeast-2 --query SecretString --output text > /tmp/prod.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/redis/prod --region ap-northeast-2 --query SecretString --output text >> /tmp/prod.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/jwt/prod --region ap-northeast-2 --query SecretString --output text >> /tmp/prod.env",
              "aws secretsmanager get-secret-value --secret-id community/melonne/sentry/prod --region ap-northeast-2 --query SecretString --output text >> /tmp/prod.env",
              "echo SPRING_PROFILES_ACTIVE=prod >> /tmp/prod.env",
              "echo APP_AWS_ENABLED=true >> /tmp/prod.env",
              "echo SPRING_AI_OPENAI_API_KEY=dummy-key-not-used >> /tmp/prod.env",
              "echo APP_BASE_URL=https://api.melonnetherapists.com >> /tmp/prod.env",
              "S3_BUCKET=$(aws ssm get-parameter --name /community/melonne/config/prod/melonne-therapists-bucket --region ap-northeast-2 --query Parameter.Value --output text)",
              "S3_REGION=$(aws ssm get-parameter --name /community/melonne/config/prod/s3-region --region ap-northeast-2 --query Parameter.Value --output text)",
              "CORS=$(aws ssm get-parameter --name /community/melonne/config/prod/cors-origins --region ap-northeast-2 --query Parameter.Value --output text)",
              "MOBILE=$(aws ssm get-parameter --name /community/melonne/config/prod/cors-mobile-origins --region ap-northeast-2 --query Parameter.Value --output text 2>/dev/null || true)",
              "echo APP_AWS_REGION=$S3_REGION >> /tmp/prod.env",
              "echo APP_AWS_S3_BUCKET=$S3_BUCKET >> /tmp/prod.env",
              "echo APP_CORS_ALLOWED_ORIGINS=$CORS >> /tmp/prod.env",
              "[ x$MOBILE != x ] && echo APP_CORS_MOBILE_ORIGINS=$MOBILE >> /tmp/prod.env || echo cors-mobile-origins absent, using yaml default",
              "docker run -d --name builders-backend-new --env-file /tmp/prod.env -p 8081:8080 $IMAGE",
              "for i in $(seq 1 12); do curl -sf http://localhost:8081/actuator/health && echo Health check passed && break || { [ $i -eq 12 ] && echo Health check failed && docker rm -f builders-backend-new && rm -f /tmp/prod.env && exit 1; }; sleep 5; done",
              "docker stop builders-backend || true",
              "docker rm builders-backend || true",
              "docker stop builders-backend-new && docker rm builders-backend-new",
              "docker run -d --name builders-backend --env-file /tmp/prod.env -p 8080:8080 --restart unless-stopped $IMAGE",
              "rm -f /tmp/prod.env",
              "docker image prune -f",
              "docker container prune -f",
              "echo Zero-downtime deploy complete"
            ]' \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id i-0086047e1fd4f4743 \
              --region ap-northeast-2 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "Deploy succeeded!"; break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed!"
              sleep 5
              echo "::group::SSM invocation"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0086047e1fd4f4743 --region ap-northeast-2 --output json || true
              echo "::endgroup::"
              echo "::group::SSM standard output"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0086047e1fd4f4743 --region ap-northeast-2 --query 'StandardOutputContent' --output text || true
              echo "::endgroup::"
              echo "::group::SSM standard error"
              aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id i-0086047e1fd4f4743 --region ap-northeast-2 --query 'StandardErrorContent' --output text || true
              echo "::endgroup::"
              exit 1
            fi
            [ "$i" -eq 30 ] && echo "Timeout" && exit 1
            sleep 10
          done
