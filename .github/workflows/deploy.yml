name: "CI/CD — main to dev"

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
      - deploy
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "771338875653"
  ECR_REPOSITORY: therapist-community-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 로컬 테스트 후 푸시 권장, CI 속도 우선. 추후 별도 test job 추가 예정
      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::771338875653:role/GitHubActionsMelonneCommunityDeployRole
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 (zero-downtime)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/therapist-community-backend:latest"

            # 1. ECR 로그인 & 이미지 풀
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker pull "$IMAGE"

            # 2. 새 컨테이너를 임시 포트(8081)로 실행
            docker rm -f builders-backend-new || true
            docker run -d \
              --name builders-backend-new \
              --env-file /etc/backend/backend.env \
              -p 8081:8080 \
              "$IMAGE"

            # 3. 헬스체크 (최대 60초, 5초 간격)
            echo "Waiting for new container health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after 60s — rolling back"
                echo "Container status before rollback:"
                docker ps -a --filter "name=builders-backend-new" || true
                docker inspect builders-backend-new \
                  --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true
                echo "Recent container logs:"
                docker logs builders-backend-new || true
                docker rm -f builders-backend-new || true
                exit 1
              fi
              sleep 5
            done

            # 4. 기존 컨테이너 종료
            docker stop builders-backend || true
            docker rm builders-backend || true

            # 5. 새 컨테이너를 정식 포트(8080)로 교체
            docker stop builders-backend-new
            docker rm builders-backend-new
            docker run -d \
              --name builders-backend \
              --env-file /etc/backend/backend.env \
              -p 8080:8080 \
              --restart unless-stopped \
              "$IMAGE"

            echo "Zero-downtime deploy complete"
  deploy-prod:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    environment: production
    steps:
      - name: Deploy to EC2 prod (zero-downtime)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PROD_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/therapist-community-backend:latest"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker pull "$IMAGE"
            docker rm -f builders-backend-new || true
            docker run -d \
              --name builders-backend-new \
              --env-file /etc/backend/backend.env \
              -p 8081:8080 \
              "$IMAGE"
            echo "Waiting for new container health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after 60s — rolling back"
                echo "Container status before rollback:"
                docker ps -a --filter "name=builders-backend-new" || true
                docker inspect builders-backend-new \
                  --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' || true
                echo "Recent container logs:"
                docker logs builders-backend-new || true
                docker rm -f builders-backend-new || true
                exit 1
              fi
              sleep 5
            done
            docker stop builders-backend || true
            docker rm builders-backend || true
            docker stop builders-backend-new
            docker rm builders-backend-new
            docker run -d \
              --name builders-backend \
              --env-file /etc/backend/backend.env \
              -p 8080:8080 \
              --restart unless-stopped \
              "$IMAGE"
            echo "Zero-downtime deploy complete"
