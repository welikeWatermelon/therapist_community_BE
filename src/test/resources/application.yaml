spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

jwt:
  access-secret: test-access-secret-key-for-jwt-1234567890
  refresh-secret: test-refresh-secret-key-for-jwt-1234567890
  access-ttl-sec: 1800
  refresh-ttl-sec: 1209600

app:
  search:
    strategy: gin
  base-url: http://localhost:8080
  aws:
    region: ap-northeast-2
    s3:
      bucket: test-bucket
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000
    mobile-origins: capacitor://localhost,http://localhost,https://localhost