spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

jwt:
  access-secret: test-access-secret-key-for-jwt-1234567890
  access-ttl-sec: 1800
  refresh-ttl-sec: 1209600

app:
  aws:
    region: ap-northeast-2
    s3:
      bucket: test-bucket
