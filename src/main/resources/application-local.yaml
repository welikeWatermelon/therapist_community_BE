spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/builders
    username: builders
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  access-secret: your-very-long-random-secret-key
  refresh-secret: your-very-long-random-refresh-secret-key
  access-ttl-sec: 1800
  refresh-ttl-sec: 1209600

app:
  upload-dir: uploads
  aws:
    region: ap-northeast-2
    s3:
      bucket: melonne-stg-images