spring:
  application:
    name: backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
  jpa:
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
auth:
  cookie:
    refresh:
      name: refreshToken
      path: /api/v1/auth
      same-site: Lax
      secure: true
server:
  error:
    whitelabel:
      enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
    redis:
      enabled: false
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
  knowledge:
    enabled: ${KNOWLEDGE_ENABLED:false}
    api-key: ${GOOGLE_AI_API_KEY:}
    embedding-model: ${KNOWLEDGE_EMBEDDING_MODEL:text-embedding-004}
  ai-comment:
    enabled: ${AI_COMMENT_ENABLED:false}
    api-key: ${GOOGLE_AI_API_KEY:}
    chat-model: ${AI_COMMENT_CHAT_MODEL:gemini-2.5-flash}
    embedding-model: ${AI_COMMENT_EMBEDDING_MODEL:text-embedding-004}
    ai-user-email: ${AI_COMMENT_USER_EMAIL:ai-comment@system.local}
