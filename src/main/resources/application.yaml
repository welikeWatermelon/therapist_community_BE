spring:
  application:
    name: backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
    # Spring AI starter는 OPENAI_API_KEY가 비면 부팅 시 audio.speech 등 bean 생성에서 IllegalArgumentException 발생.
    # 운영에선 OpenAI 사용 안 하므로 모든 모델을 none으로 비활성화. 사용 시 환경별 yaml에서 override.
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
auth:
  cookie:
    refresh:
      name: refreshToken
      path: /api/v1/auth
      same-site: Lax
      secure: true
server:
  error:
    whitelabel:
      enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: false
    redis:
      enabled: false
app:
  base-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
  knowledge:
    enabled: ${KNOWLEDGE_ENABLED:false}
    api-key: ${GOOGLE_AI_API_KEY:}
    embedding-model: ${KNOWLEDGE_EMBEDDING_MODEL:gemini-embedding-001}
  ai-comment:
    enabled: ${AI_COMMENT_ENABLED:false}
    api-key: ${GOOGLE_AI_API_KEY:}
    chat-model: ${AI_COMMENT_CHAT_MODEL:gemini-2.5-flash}
    embedding-model: ${AI_COMMENT_EMBEDDING_MODEL:gemini-embedding-001}
    ai-user-email: ${AI_COMMENT_USER_EMAIL:ai-comment@system.local}
  search:
    strategy: gin
    embedding:
      enabled: false
    vector:
      min-score: 0.3
sentry:
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0
  environment: ${SPRING_PROFILES_ACTIVE}
