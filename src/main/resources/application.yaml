spring:
  application:
    name: backend
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
auth:
  cookie:
    refresh:
      name: refreshToken
      path: /api/v1/auth
      same-site: Lax
      secure: true
app:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
